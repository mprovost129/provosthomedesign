<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <title>Provost Home Design Web social preview</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; margin: 0; overflow: hidden; }
    body {
      position: relative;
      display: grid;
      grid-template-rows: 1fr 94px;
      color: #17211f;
      background:
        linear-gradient(90deg, rgba(23, 33, 31, .055) 1px, transparent 1px),
        linear-gradient(rgba(23, 33, 31, .055) 1px, transparent 1px),
        #fffaf1;
      background-size: 32px 32px;
      font-family: "Century Gothic", Calibri, sans-serif;
    }
    .shape {
      position: absolute;
      width: 470px;
      height: 470px;
      right: -155px;
      top: -85px;
      border: 92px solid #46664d;
      border-radius: 50% 35% 55% 42%;
      opacity: .17;
      transform: rotate(18deg);
    }
    main { position: relative; padding: 58px 76px 40px; }
    .brand { display: flex; align-items: center; gap: 18px; }
    .mark {
      display: grid;
      width: 70px;
      height: 70px;
      place-items: center;
      border-radius: 50% 50% 12% 50%;
      background: #e95d2a;
      color: white;
      font-size: 26px;
      font-weight: 800;
    }
    .name { font-size: 25px; font-weight: 700; letter-spacing: -.02em; }
    .name span { color: #bd3f16; font-size: 17px; letter-spacing: .12em; }
    .eyebrow {
      margin: 72px 0 15px;
      color: #bd3f16;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    h1 {
      max-width: 850px;
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 76px;
      line-height: .96;
      letter-spacing: -.045em;
    }
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 76px;
      background: #17211f;
      color: #fffaf1;
      font-size: 19px;
    }
    footer strong { color: #e4a853; font-size: 17px; letter-spacing: .07em; }
  </style>
</head>
<body>
  <div class="shape" aria-hidden="true"></div>
  <main>
    <div class="brand"><div class="mark">P/</div><div class="name">Provost Home Design <span>/ WEB</span></div></div>
    <p class="eyebrow">Websites for working businesses</p>
    <h1>Clear online.<br>Useful every day.</h1>
  </main>
  <footer><span>Business websites and custom applications</span><strong>WEB.PROVOSTHOMEDESIGN.COM</strong></footer>
</body>
</html>
